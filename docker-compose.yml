# Docker Compose for development and production deployment
version: '3.8'

services:
  # PostgreSQL Database with pgvector support
  postgres:
    image: pgvector/pgvector:pg16
    container_name: askdoc-postgres
    environment:
      POSTGRES_USER: askdoc_user
      POSTGRES_PASSWORD: askdoc_password_change_me
      POSTGRES_DB: askdoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - askdoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askdoc_user -d askdoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: askdoc-backend
    environment:
      DATABASE_URL: postgresql://askdoc_user:askdoc_password_change_me@postgres:5432/askdoc
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "False"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - askdoc-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: askdoc-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - askdoc-network
    command: npm start

  # Nginx Reverse Proxy (optional, for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: askdoc-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - askdoc-network

volumes:
  postgres_data:

networks:
  askdoc-network:
    driver: bridge
